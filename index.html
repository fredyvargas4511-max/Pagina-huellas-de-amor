<link rel="stylesheet" href="style.css">

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Desarrollo</title>
    <style>
        /* Esto es CSS dentro del HTML para ir rápido */
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #333;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid #007acc;
        }
        h1 { color: #007acc; }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #005a9e; }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Conexión Exitosa! 🚀</h1>
        <p>Si ves este recuadro oscuro con bordes azules,</p>
        <p><strong>HTML y CSS</strong> prueba conexion github exitosa .</p>
        <button onclick="alert('¡JavaScript también funciona!')">Probar JS</button>
    </div>

</body>
</html>
